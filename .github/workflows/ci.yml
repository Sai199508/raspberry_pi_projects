name: Raspberry Pi Projects CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.13]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Home Automation API Tests
      working-directory: home_automation_api
      run: |
        pytest tests

    - name: Run Smart Door Lock Tests
      working-directory: smart_door_lock
      run: |
        pytest tests

    - name: Run Smart Temperature System Tests
      working-directory: smart_temperature_system
      run: |
        pytest tests

    # Future steps for lint / type checking / coverage
