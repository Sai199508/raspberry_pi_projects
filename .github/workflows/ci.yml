name: Raspberry Pi Projects CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.13]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: pip install -r requirements.txt

    # ------------------- Run Tests -------------------
    - name: Run Home Automation API Tests
      working-directory: home_automation_api
      run: pytest --maxfail=1 --disable-warnings -q

    - name: Run Smart Door Lock Tests
      working-directory: smart_door_lock
      run: pytest --maxfail=1 --disable-warnings -q

    - name: Run Smart Temperature System Tests
      working-directory: smart_temperature_system
      run: pytest --maxfail=1 --disable-warnings -q

    # ------------------- Linting -------------------
    - name: Run Flake8 Linter
      run: |
        pip install flake8
        flake8 home_automation_api smart_door_lock smart_temperature_system

    # ------------------- Type Checking -------------------
    - name: Run MyPy Type Checking
      run: |
        pip install mypy
        mypy home_automation_api smart_door_lock smart_temperature_system

    # ------------------- Test Coverage -------------------
    - name: Run Coverage
      run: |
        pip install coverage
        coverage run -m pytest
        coverage report -m
