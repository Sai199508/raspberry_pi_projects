name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.13]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 mypy codecov

    - name: Run Lint Checks (flake8)
      run: |
        flake8 home_automation_api smart_door_lock smart_temperature_system

    - name: Run Type Checks (mypy)
      run: |
        mypy home_automation_api smart_door_lock smart_temperature_system

    - name: Run Tests with Coverage
      run: |
        pytest --cov=home_automation_api \
               --cov=smart_door_lock \
               --cov=smart_temperature_system \
               --cov-report=xml \
               --maxfail=1 --disable-warnings -q

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: coverage.xml
        fail_ci_if_error: true
